name: Test with OpenRGB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Start OpenRGB server
        run: |
          docker build -t openrgb-server -f Containerfile .
          docker run -d --name openrgb -p 6742:6742 openrgb-server
          sleep 10
      - name: Run Swift tests
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e OPENRGB_HOST=localhost \
            -e OPENRGB_PORT=6742 \
            swift:noble \
            swift test
